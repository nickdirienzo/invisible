apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels: &a1
    app: web
spec:
  replicas: 1
  selector:
    matchLabels: *a1
  template:
    metadata:
      labels: *a1
    spec:
      containers:
        - name: web
          image: 01-hello-world/web
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: web
spec:
  selector:
    app: web
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: web-route
spec:
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: web
          port: 80
